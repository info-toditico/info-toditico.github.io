<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Toditico Energía Limpia - Soluciones en energía solar y eólica"
    />
    <title>Toditico - Energía Limpia</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
      <i class="fas fa-moon"></i>
    </button>

    <!-- Main Container -->
    <main class="container">
      <!-- Header Section -->
      <header class="header">
        <h1 class="title" id="siteMainTitle">
          Información General de Toditico
        </h1>
        <h2 class="subtitle" id="siteSubTitle">Energía Limpia</h2>
      </header>

      <!-- Download Buttons Section -->
      <section class="downloads-section section-card">
        <div class="button-grid">
          <a
            href="assets/downloads/TODITICO_CATÁLOGO_Energía_Limpia.xlsx"
            download
            class="btn btn-primary"
            id="downloadBtn1"
          >
            <i class="fas fa-file-excel"></i>
            <span id="downloadBtn1Text">Catálogo de Productos Renovables</span>
          </a>

          <a href="manuales.html" class="btn btn-primary" id="downloadBtn2">
            <i class="fas fa-file-pdf"></i>
            <span id="downloadBtn2Text">Fichas técnicas y Manuales</span>
          </a>
        </div>
      </section>

      <!-- Social Media Section -->
      <section class="social-section section-card">
        <h2 class="section-title">Redes Sociales</h2>
        <div class="social-icons">
          <a
            href="https://instagram.com/toditico"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link instagram"
            aria-label="Instagram"
            id="socialInstagram"
          >
            <i class="fab fa-instagram"></i>
          </a>
          <a
            href="https://facebook.com/toditico"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link facebook"
            aria-label="Facebook"
            id="socialFacebook"
          >
            <i class="fab fa-facebook-f"></i>
          </a>
          <a
            href="https://wa.me/1234567890"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link whatsapp"
            aria-label="WhatsApp"
            id="socialWhatsapp"
          >
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </section>

      <!-- Contact Buttons -->
      <section class="contact-section section-card">
        <div class="contact-buttons">
          <a
            href="https://wa.me/+5350745857"
            class="btn btn-secondary"
            id="contactAdminBtn"
          >
            <i class="fas fa-user-shield"></i>
            <span id="contactAdminText">Contactar al Administrador</span>
          </a>
          <a
            href="https://wa.me/+5350524119"
            class="btn btn-secondary"
            id="contactStoreBtn"
          >
            <i class="fas fa-store"></i>
            <span id="contactStoreText">Contactar con la Tienda</span>
          </a>
        </div>
      </section>

      <!-- Logo Section -->
      <section class="logo-section">
        <img
          src="assets/logo.png"
          alt="Toditico Energía Limpia"
          class="logo"
          id="siteLogo"
        />
      </section>

      <!-- Footer -->
      <footer class="footer">
        <p id="siteFooterText">
          &copy; 2026 Toditico Energía Limpia. Todos los derechos reservados.
        </p>
      </footer>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
